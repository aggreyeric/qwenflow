<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QwenFlow — AI Agent Orchestrator</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --surface: #12122a;
      --card: #1a1a3e;
      --card-hover: #222255;
      --accent: #00d9ff;
      --accent2: #7b61ff;
      --success: #00ff88;
      --warning: #ffaa00;
      --danger: #ff4466;
      --text: #e0e0ff;
      --text-dim: #8888aa;
      --border: #2a2a4a;
      --radius: 12px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      background: linear-gradient(135deg, var(--surface), var(--card));
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      font-size: 24px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--success);
      font-size: 14px;
    }
    header .status::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    main {
      display: grid;
      grid-template-columns: 280px 1fr 320px;
      gap: 0;
      height: calc(100vh - 73px);
    }
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
    }
    .sidebar h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 12px;
    }
    .model-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .model-card:hover {
      background: var(--card-hover);
      border-color: var(--accent);
      transform: translateX(4px);
    }
    .model-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 12px rgba(0, 217, 255, 0.2);
    }
    .model-card .name {
      font-weight: 600;
      font-size: 15px;
      color: var(--accent);
    }
    .model-card .desc {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    .model-card .caps {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .model-card .caps span {
      background: rgba(0, 217, 255, 0.1);
      color: var(--accent);
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 10px;
    }
    .canvas {
      padding: 24px;
      overflow-y: auto;
    }
    .canvas h2 {
      font-size: 18px;
      margin-bottom: 4px;
    }
    .canvas .subtitle {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 20px;
    }
    .step-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      transition: all 0.2s;
    }
    .step-card:hover {
      border-color: var(--accent2);
    }
    .step-card .step-num {
      position: absolute;
      top: -10px;
      left: 16px;
      background: var(--accent);
      color: var(--bg);
      font-weight: 700;
      font-size: 12px;
      padding: 2px 10px;
      border-radius: 10px;
    }
    .step-card .step-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    .step-card select, .step-card input, .step-card textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: inherit;
      margin-bottom: 8px;
    }
    .step-card select:focus, .step-card input:focus, .step-card textarea:focus {
      outline: none;
      border-color: var(--accent);
    }
    .step-card textarea {
      min-height: 60px;
      resize: vertical;
    }
    .step-card .temp-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .step-card .temp-row label {
      font-size: 12px;
      color: var(--text-dim);
      min-width: 80px;
    }
    .step-card .temp-row input[type="range"] {
      flex: 1;
      accent-color: var(--accent);
    }
    .step-card .temp-row .val {
      font-size: 13px;
      color: var(--accent);
      min-width: 30px;
      text-align: right;
    }
    .remove-step {
      background: none;
      border: 1px solid var(--danger);
      color: var(--danger);
      border-radius: 6px;
      padding: 4px 10px;
      cursor: pointer;
      font-size: 11px;
    }
    .remove-step:hover {
      background: var(--danger);
      color: white;
    }
    .add-step-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      color: var(--text-dim);
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .add-step-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .workflow-name {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      color: var(--text);
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }
    .workflow-name:focus {
      outline: none;
      border-color: var(--accent);
    }
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-run {
      flex: 1;
      padding: 14px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: var(--radius);
      color: white;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-run:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 20px rgba(0, 217, 255, 0.3);
    }
    .btn-run:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }
    .btn-run.running {
      animation: glow 1.5s infinite;
    }
    @keyframes glow {
      0%, 100% { box-shadow: 0 0 10px rgba(0, 217, 255, 0.2); }
      50% { box-shadow: 0 0 25px rgba(0, 217, 255, 0.5); }
    }
    .results-panel {
      background: var(--surface);
      border-left: 1px solid var(--border);
      padding: 20px;
      overflow-y: auto;
    }
    .results-panel h3 {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-dim);
      margin-bottom: 16px;
    }
    .result-item {
      background: var(--card);
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 3px solid var(--accent);
    }
    .result-item.pending {
      border-left-color: var(--warning);
      opacity: 0.5;
    }
    .result-item.error {
      border-left-color: var(--danger);
    }
    .result-item .r-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .result-item .r-model {
      color: var(--accent);
      font-weight: 600;
      font-size: 13px;
    }
    .result-item .r-meta {
      color: var(--text-dim);
      font-size: 11px;
    }
    .result-item .r-content {
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
    }
    .empty-state .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }
    .connector {
      width: 2px;
      height: 20px;
      background: var(--border);
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <header>
    <h1>⚡ QwenFlow</h1>
    <div class="status">Connected to <span id="endpoint">localhost:3000</span></div>
  </header>
  <main>
    <aside class="sidebar">
      <h3>Qwen Models</h3>
      <div id="model-list"></div>
    </aside>
    <section class="canvas">
      <h2>Workflow Builder</h2>
      <p class="subtitle">Add steps, choose models, define prompts. Then run.</p>
      <input class="workflow-name" id="wf-name" placeholder="Workflow name..." value="My AI Agent">
      <div id="steps-container"></div>
      <button class="add-step-btn" onclick="addStep()">+ Add Step</button>
      <div class="actions">
        <button class="btn-run" id="run-btn" onclick="runWorkflow()">▶ Run Workflow</button>
      </div>
    </section>
    <aside class="results-panel">
      <h3>Execution Results</h3>
      <div id="results-container">
        <div class="empty-state">
          <div class="icon">⚡</div>
          <p>Run a workflow to see results here</p>
        </div>
      </div>
    </aside>
  </main>

  <script>
    const API = window.location.origin;
    let models = [];
    let steps = [];
    let stepCounter = 0;

    async function loadModels() {
      try {
        const res = await fetch(`${API}/api/models`);
        models = await res.json();
        renderModels();
      } catch (e) {
        console.error('Failed to load models:', e);
      }
    }

    function renderModels() {
      const list = document.getElementById('model-list');
      list.innerHTML = models.map(m => `
        <div class="model-card" data-model="${m.id}" onclick="selectModel(this)">
          <div class="name">${m.name}</div>
          <div class="desc">${m.description}</div>
          <div class="caps">${m.capabilities.map(c => `<span>${c}</span>`).join('')}</div>
        </div>
      `).join('');
    }

    function selectModel(el) {
      document.querySelectorAll('.model-card').forEach(c => c.classList.remove('selected'));
      el.classList.add('selected');
    }

    function addStep() {
      const id = `step-${++stepCounter}`;
      steps.push(id);
      const container = document.getElementById('steps-container');
      if (steps.length > 1) {
        container.innerHTML += `<div class="connector"></div>`;
      }
      container.innerHTML += `
        <div class="step-card" id="${id}">
          <div class="step-num">Step ${steps.length}</div>
          <div class="step-header">
            <select onchange="updateModel('${id}', this.value)">
              ${models.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
            </select>
            <button class="remove-step" onclick="removeStep('${id}')">✕ Remove</button>
          </div>
          <textarea placeholder="Enter prompt for this step..." id="${id}-prompt"></textarea>
          <div class="temp-row">
            <label>Temperature</label>
            <input type="range" min="0" max="2" step="0.1" value="0.7"
              oninput="this.nextElementSibling.textContent=this.value">
            <span class="val">0.7</span>
          </div>
        </div>
      `;
    }

    function removeStep(id) {
      steps = steps.filter(s => s !== id);
      document.getElementById(id)?.remove();
      // Fix connector artifacts
      document.querySelectorAll('.connector').forEach(c => c.remove());
      renumberSteps();
    }

    function renumberSteps() {
      document.querySelectorAll('.step-card').forEach((card, i) => {
        card.querySelector('.step-num').textContent = `Step ${i + 1}`;
      });
    }

    async function runWorkflow() {
      const btn = document.getElementById('run-btn');
      if (steps.length === 0) {
        alert('Add at least one step');
        return;
      }

      // Build workflow payload
      const wfSteps = steps.map((id, i) => {
        const card = document.getElementById(id);
        return {
          id: `s${i}`,
          model: card.querySelector('select').value,
          prompt: card.querySelector('textarea').value || `Step ${i + 1} processing`,
          temperature: parseFloat(card.querySelector('input[type=range]').value),
        };
      });

      const name = document.getElementById('wf-name').value || 'Untitled Workflow';

      btn.disabled = true;
      btn.textContent = '⏳ Creating workflow...';
      btn.classList.add('running');

      try {
        // Create workflow
        const createRes = await fetch(`${API}/api/workflows`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, description: '', steps: wfSteps }),
        });
        const workflow = await createRes.json();

        if (!workflow.id) throw new Error('Failed to create workflow');

        btn.textContent = '▶ Running...';

        // Run workflow
        const runRes = await fetch(`${API}/api/workflows/${workflow.id}/run`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({}),
        });
        const run = await runRes.json();

        // Display results
        renderResults(run);

      } catch (e) {
        renderResults({ status: 'failed', error: e.message, results: [] });
      } finally {
        btn.disabled = false;
        btn.textContent = '▶ Run Workflow';
        btn.classList.remove('running');
      }
    }

    function renderResults(run) {
      const container = document.getElementById('results-container');
      if (run.status === 'failed') {
        container.innerHTML = `
          <div class="result-item error">
            <div class="r-head"><span class="r-model">Error</span><span class="r-meta">${run.status}</span></div>
            <div class="r-content">${run.error || 'Unknown error'}</div>
          </div>`;
        return;
      }

      const tokens = run.results.reduce((a, r) => ({
        prompt: a.prompt + (r.tokens?.prompt || 0),
        completion: a.completion + (r.tokens?.completion || 0),
      }), { prompt: 0, completion: 0 });

      const totalTime = run.results.reduce((a, r) => a + (r.latency || 0), 0);

      let html = `
        <div class="result-item" style="border-left-color: var(--success)">
          <div class="r-head"><span class="r-model">✅ Workflow Complete</span><span class="r-meta">${run.results.length} steps · ${totalTime}ms</span></div>
          <div class="r-content">Tokens: ${tokens.prompt} prompt + ${tokens.completion} completion</div>
        </div>`;

      run.results.forEach((r, i) => {
        html += `
          <div class="result-item">
            <div class="r-head"><span class="r-model">Step ${i + 1} — ${r.model}</span><span class="r-meta">${r.latency}ms</span></div>
            <div class="r-content">${r.content}</div>
          </div>`;
      });

      container.innerHTML = html;
    }

    // Init
    loadModels();
    addStep(); // Start with one step
  </script>
</body>
</html>
